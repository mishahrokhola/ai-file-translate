<header class="max-w-6xl mx-auto flex justify-between items-center mb-10">
  <div class="flex items-center gap-3">
    <div
      class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20"
    >
      <svg width="20" height="20" stroke-width="2">
        <use href="#icon-languages" />
      </svg>
    </div>
    <h1
      class="text-2xl font-black tracking-tight bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-400 bg-clip-text text-transparent"
    >
      MI TRANSLATOR
    </h1>
  </div>

  <button
    (click)="theme.toggle()"
    class="cursor-pointer select-none p-2.5 sm:p-3 rounded-full bg-white dark:bg-slate-800 shadow-md hover:shadow-lg transition-all text-slate-600 dark:text-yellow-400 border border-slate-200 dark:border-slate-700 active:scale-90"
    aria-label="Toggle Theme"
  >
    @if (!theme.isDark()) {
      <svg width="20" height="20" stroke-width="2" class="sm:w-6 sm:h-6">
        <use href="#icon-sun" />
      </svg>
    } @else {
      <svg width="20" height="20" stroke-width="2" class="sm:w-6 sm:h-6">
        <use href="#icon-moon" />
      </svg>
    }
  </button>
</header>
