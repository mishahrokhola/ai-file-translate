<div class="min-h-screen bg-slate-50 dark:bg-slate-950 p-4 sm:p-8">
  <dashboard-header />

  <main class="max-w-6xl mx-auto">
    <tabs [(activeTab)]="currentTab" />

    @if (currentTab() === 'books') {
      <book-list (goToUpload)="goToUpload.emit()" />
    } @else {
      <div class="p-20 text-center animate-in fade-in zoom-in duration-300">
        <div
          class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400"
        >
          <svg width="30" height="30" stroke-width="2">
            <use href="#icon-mic" />
          </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-800 dark:text-white">Voice Lab</h3>
        <p class="text-slate-500 max-w-xs mx-auto">
          Керування вашими RVC моделями буде доступне в наступному оновленні.
        </p>
      </div>
    }
  </main>
</div>
